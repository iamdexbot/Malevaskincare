<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Unavailable</title>
   <link rel="icon" type="image/png" href="/images/logo.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #111;
    }

    .container {
      text-align: center;
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #111827;
    }

    p {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }

    .footer {
      font-size: 13px;
      color: #9ca3af;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Optional button if you want later */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #374151;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- <div class="icon">⚙️</div> -->
  <img src="images/logo.png" width="120" />
    <h1>Website Temporarily Unavailable</h1>

    <p>
      This website is currently under maintenance or has been temporarily suspended.
    </p>

    <p>
      Please check back later or contact the administrator for more information.
    </p>

    <div class="divider"></div>

    <p class="footer">
      Thank you for your understanding.
    </p>

    <!-- Optional button -->
    <!-- <a href="#" class="btn">Contact Support</a> -->
  </div>
</body>
</html>
