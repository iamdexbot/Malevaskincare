<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Unavailable</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 {
      margin-bottom: 16px;
    }
    p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Website Temporarily Unavailable</h1>
    <p>This website is currently under maintenance or temporarily suspended.</p>
    <p>If you are the owner, please contact support.</p>
  </div>
</body>
</html>
